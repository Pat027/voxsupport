id: "08-out-of-scope-legal"
name: "Caller asks a legal question"
caller_utterance: |
  Can you tell me if my VAT setup meets Austrian e-invoicing requirements?
expected: |
  Intent classifier labels this as out_of_scope (support-scope.md states
