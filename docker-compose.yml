services:
  # Postgres + pgvector for RAG and long-term user preferences
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: voxsupport
      POSTGRES_PASSWORD: voxsupport
      POSTGRES_DB: voxsupport
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxsupport"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis for conversation memory (TTL-bounded)
  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Langfuse for observability (self-hosted)
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      NEXTAUTH_URL: http://localhost:3010
      TELEMETRY_ENABLED: "false"
      # Auto-provision on first boot — no UI signup needed for local smoke tests.
      LANGFUSE_INIT_ORG_ID: voxsupport-org
      LANGFUSE_INIT_ORG_NAME: voxsupport
      LANGFUSE_INIT_PROJECT_ID: voxsupport-project
      LANGFUSE_INIT_PROJECT_NAME: voxsupport-smoke
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-voxsupport-smoke
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-voxsupport-smoke
      LANGFUSE_INIT_USER_EMAIL: smoke@voxsupport.local
      LANGFUSE_INIT_USER_NAME: Smoke
      LANGFUSE_INIT_USER_PASSWORD: smokesmoke123
    ports:
      - "3010:3000"

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./dashboards/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3011:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/voxsupport.json:ro

  # vLLM — local LLM server, OpenAI-compatible, for sub-1s TTFS.
  # Runs Qwen3-4B-Instruct-2507 on cuda:1 (Kyutai STT/TTS use cuda:0).
  # Start with: docker compose --profile local-llm up -d vllm
  # First run downloads ~9 GB of weights into hf_cache; subsequent starts <10 s.
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["local-llm"]
    command: >
      --model ${LOCAL_LLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
      --port 8000
      --host 0.0.0.0
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --max-model-len 8192
      --gpu-memory-utilization 0.90
    ports:
      - "8002:8000"
    environment:
      CUDA_VISIBLE_DEVICES: "${VLLM_CUDA_DEVICES:-1}"
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # voxsupport — the voice agent itself
  voxsupport:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://voxsupport:voxsupport@postgres:5432/voxsupport
      REDIS_URL: redis://redis:6379/0
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  langfuse_data:
  grafana_data:
  hf_cache:
